version: '3.8'

services:
  api:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./BACKEND/data:/app/data
    environment:
      - MODEL_PATH=/app/data/models/kyc_model.joblib
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
